<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나만의 감귤 굿즈 디자인 🛍️</title>
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .stage { max-width: 980px; margin: 0 auto; }
  .layout { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; }
  .side { width:220px; flex-shrink:0; }
  .side h3{ color:var(--orange-deep); font-size:14px; margin:0 0 8px; }
  .side-card{ background:#fff; border-radius:16px; padding:14px; box-shadow:var(--shadow-soft); margin-bottom:14px; }
  .stickers{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .stickers button{ font-size:24px; border:none; background:#fff8ef; border-radius:10px; cursor:grab; padding:6px 0; transition:.15s; }
  .stickers button:hover{ background:var(--orange-soft); transform:scale(1.1); }
  .product-tabs{ display:flex; gap:6px; flex-wrap:wrap; }
  .product-tabs button{ flex:1; border:2px solid #ffe0bf; background:#fff; cursor:pointer; font-family:inherit; font-weight:700; font-size:12px; padding:8px 4px; border-radius:10px; }
  .product-tabs button.on{ background:#fff3e2; border-color:var(--orange); color:var(--orange-deep); }
  .colors{ display:flex; gap:6px; flex-wrap:wrap; }
  .colors button{ width:28px;height:28px;border-radius:50%;border:2px solid #fff; box-shadow:0 0 0 1px #ddd; cursor:pointer; }
  .colors button.on{ box-shadow:0 0 0 2px var(--ink); }

  .stage-canvas{ flex:1; min-width:280px; display:flex; flex-direction:column; align-items:center; }
  .board {
    position:relative; width:100%; max-width:440px; aspect-ratio:1;
    border-radius:20px; box-shadow:var(--shadow); overflow:hidden;
    background:#eee; touch-action:none;
  }
  #bagShape{ position:absolute; inset:0; width:100%; height:100%; }
  .drop-item{ position:absolute; transform:translate(-50%,-50%); cursor:grab; user-select:none; z-index:2; }
  .drop-item.selected{ outline:2px dashed var(--orange-deep); outline-offset:3px; }
  .drop-item .del{ position:absolute; top:-10px; right:-10px; background:#e53935; color:#fff; border:none; border-radius:50%; width:20px;height:20px; font-size:12px; cursor:pointer; display:none; line-height:1; }
  .drop-item.selected .del{ display:block; }
  .txtitem{ font-weight:800; white-space:nowrap; }
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
  .toolbar .btn{ font-size:14px; padding:10px 16px; }
  .sel-controls{ background:#fff; border-radius:12px; padding:10px 14px; margin-top:12px; display:none; gap:10px; align-items:center; flex-wrap:wrap; box-shadow:var(--shadow-soft); }
  .sel-controls.show{ display:flex; }
  .sel-controls label{ font-size:12px; font-weight:700; color:var(--ink-soft); display:flex; align-items:center; gap:6px; }
  .sel-controls input[type=range]{ accent-color:var(--orange); width:90px; }
  .addtext{ display:flex; gap:6px; margin-top:8px; }
  .addtext input{ flex:1; font-family:inherit; font-size:13px; padding:8px 10px; border:2px solid #ffe0bf; border-radius:10px; outline:none; }
  .hint{ color:var(--ink-soft); font-size:13px; text-align:center; margin-top:10px; }
  .event-note{ background:linear-gradient(135deg,#fff3e2,#ffe6c9); border-radius:14px; padding:12px 16px; font-size:13px; margin-top:14px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="logo" href="../index.html"><span class="dot"></span>감귤 체험존</a>
    <a class="back" href="../index.html">← 메인으로</a>
  </div>

  <header class="page-head">
    <div class="emoji">🛍️</div>
    <h1>나만의 감귤 굿즈 디자인</h1>
    <p>스티커·일러스트를 드래그해 에코백·엽서를 디자인하세요! 우수작은 실물 제작 이벤트로 연결됩니다</p>
  </header>

  <main class="wrap stage">
    <div class="card">
      <div class="layout">
        <!-- 왼쪽 도구 -->
        <div class="side">
          <div class="side-card">
            <h3>🎁 굿즈 종류</h3>
            <div class="product-tabs" id="products">
              <button class="on" data-p="bag">👜 에코백</button>
              <button data-p="card">💌 엽서</button>
              <button data-p="tee">👕 티셔츠</button>
            </div>
          </div>
          <div class="side-card">
            <h3>🎨 배경 색</h3>
            <div class="colors" id="bgColors"></div>
          </div>
          <div class="side-card">
            <h3>🍊 스티커 (드래그 또는 클릭)</h3>
            <div class="stickers" id="stickers"></div>
          </div>
          <div class="side-card">
            <h3>✍️ 텍스트 추가</h3>
            <div class="addtext">
              <input id="txtInput" placeholder="문구 입력" maxlength="18" />
              <button class="btn" style="padding:8px 12px;font-size:13px" onclick="addText()">추가</button>
            </div>
          </div>
        </div>

        <!-- 캔버스 -->
        <div class="stage-canvas">
          <div class="board" id="board">
            <svg id="bagShape" viewBox="0 0 400 400"></svg>
            <!-- drop items -->
          </div>

          <div class="sel-controls" id="selCtrl">
            <label>크기 <input type="range" id="scaleR" min="20" max="140" value="48"></label>
            <label>회전 <input type="range" id="rotR" min="-180" max="180" value="0"></label>
            <button class="btn ghost" style="padding:7px 12px;font-size:12px" onclick="bringFront()">맨 앞으로</button>
          </div>

          <div class="toolbar">
            <button class="btn ghost" onclick="clearAll()">🗑️ 전체 지우기</button>
            <button class="btn leaf" onclick="saveDesign()">💾 디자인 저장</button>
            <button class="btn" onclick="submitDesign()">🏆 이벤트 응모</button>
          </div>

          <div class="event-note">
            🎉 <b>실물 제작 이벤트!</b> 완성한 디자인을 응모하면 매주 우수작을 선정해<br/>
            실제 굿즈로 제작 후 <b>무료 배송</b>해드려요. 마음껏 꾸며보세요!
          </div>
          <p class="hint">💡 아이템을 클릭하면 선택돼요 · 드래그로 이동 · 슬라이더로 크기/회전 조절</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site">🍊 제주 감귤 체험존 · 나만의 감귤 굿즈 디자인</footer>

  <script src="../assets/common.js"></script>
  <script>
    const board=document.getElementById('board');
    const bag=document.getElementById('bagShape');
    let product='bag', bgColor='#fff4e0', selected=null, z=10;

    const stickerList=['🍊','🍃','🌿','☀️','🌊','🐦','🍋','🌸','⭐','💛','🧡','🍯','🏝️','😊','✨','🎀'];
    document.getElementById('stickers').innerHTML=stickerList.map(s=>`<button draggable="true" data-s="${s}">${s}</button>`).join('');

    const bgList=['#fff4e0','#ffe0a3','#ffd1a3','#e8f5e9','#d7ecff','#ffffff','#3a2b1a','#ffb347','#c8e6c9','#f8bbd0'];
    document.getElementById('bgColors').innerHTML=bgList.map((c,i)=>`<button data-c="${c}" class="${i===0?'on':''}" style="background:${c}"></button>`).join('');

    // 제품 모양 그리기
    function drawProduct(){
      board.style.background = product==='card' ? bgColor : '#e5e5e5';
      let svg='';
      if(product==='bag'){
        svg=`<rect x="70" y="90" width="260" height="270" rx="8" fill="${bgColor}" stroke="#d8c4a8" stroke-width="2"/>
             <path d="M140 90 Q140 40 200 40 Q260 40 260 90" fill="none" stroke="#c9a97e" stroke-width="14" stroke-linecap="round"/>`;
      } else if(product==='card'){
        svg=`<rect x="40" y="70" width="320" height="260" rx="10" fill="${bgColor}" stroke="#e0d5c0" stroke-width="2"/>
             <rect x="40" y="70" width="320" height="260" rx="10" fill="none" stroke="#00000010" stroke-width="1" stroke-dasharray="6 6"/>`;
      } else {
        svg=`<path d="M120 70 L90 110 L120 140 L120 340 L280 340 L280 140 L310 110 L280 70 L240 70 Q200 105 160 70 Z" fill="${bgColor}" stroke="#d8c4a8" stroke-width="2"/>`;
      }
      bag.innerHTML=svg;
    }

    // 배경색
    document.getElementById('bgColors').onclick=(e)=>{
      const b=e.target.closest('button'); if(!b) return;
      bgColor=b.dataset.c;
      [...e.currentTarget.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');
      drawProduct();
    };
    // 제품 전환
    document.getElementById('products').onclick=(e)=>{
      const b=e.target.closest('button'); if(!b) return;
      product=b.dataset.p;
      [...e.currentTarget.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');
      drawProduct();
    };

    // ===== 아이템 추가 =====
    function makeItem(content, isText){
      const el=document.createElement('div');
      el.className='drop-item'+(isText?' txtitem':'');
      el.dataset.scale='48'; el.dataset.rot='0';
      el.dataset.text=isText?'1':'0';
      el.dataset.label=content;
      el.style.left='50%'; el.style.top='50%'; el.style.zIndex=++z;
      el.style.fontSize=(isText?26:48)+'px';
      const span=document.createElement('span'); span.textContent=content;
      if(isText){ el.style.color='#f2740c'; }
      el.appendChild(span);
      const del=document.createElement('button'); del.className='del'; del.textContent='×';
      del.onclick=(ev)=>{ ev.stopPropagation(); el.remove(); if(selected===el){ selected=null; hideCtrl(); } };
      el.appendChild(del);
      board.appendChild(el);
      enableDrag(el);
      select(el);
      applyTransform(el);
      return el;
    }

    // 스티커 클릭 추가
    document.getElementById('stickers').onclick=(e)=>{
      const b=e.target.closest('button'); if(!b) return;
      makeItem(b.dataset.s,false);
    };
    // 스티커 드래그 → 드롭
    let dragSticker=null;
    document.getElementById('stickers').addEventListener('dragstart',(e)=>{ const b=e.target.closest('button'); if(b) dragSticker=b.dataset.s; });
    board.addEventListener('dragover',(e)=>e.preventDefault());
    board.addEventListener('drop',(e)=>{
      e.preventDefault(); if(!dragSticker) return;
      const r=board.getBoundingClientRect();
      const it=makeItem(dragSticker,false);
      it.style.left=((e.clientX-r.left)/r.width*100)+'%';
      it.style.top=((e.clientY-r.top)/r.height*100)+'%';
      dragSticker=null;
    });

    function addText(){
      const t=document.getElementById('txtInput').value.trim();
      if(!t){ toast('문구를 입력해주세요!'); return; }
      makeItem(t,true);
      document.getElementById('txtInput').value='';
    }

    // ===== 선택/변형 =====
    function select(el){
      if(selected) selected.classList.remove('selected');
      selected=el; el.classList.add('selected');
      document.getElementById('scaleR').value=el.dataset.scale;
      document.getElementById('rotR').value=el.dataset.rot;
      document.getElementById('selCtrl').classList.add('show');
    }
    function hideCtrl(){ document.getElementById('selCtrl').classList.remove('show'); }
    board.addEventListener('mousedown',(e)=>{ if(e.target===board||e.target===bag||e.target.closest('#bagShape')){ if(selected){selected.classList.remove('selected'); selected=null; hideCtrl();} } });

    document.getElementById('scaleR').oninput=(e)=>{ if(!selected) return; selected.dataset.scale=e.target.value; applyTransform(selected); };
    document.getElementById('rotR').oninput=(e)=>{ if(!selected) return; selected.dataset.rot=e.target.value; applyTransform(selected); };
    function applyTransform(el){
      const s=+el.dataset.scale, r=+el.dataset.rot;
      el.style.fontSize=s+'px';
      el.style.transform=`translate(-50%,-50%) rotate(${r}deg)`;
    }
    function bringFront(){ if(selected) selected.style.zIndex=++z; }

    // ===== 드래그 이동 =====
    function enableDrag(el){
      let sx,sy,ox,oy,dragging=false;
      const start=(e)=>{
        if(e.target.classList.contains('del')) return;
        e.preventDefault(); select(el); dragging=true;
        const p=point(e); sx=p.x; sy=p.y;
        const r=board.getBoundingClientRect();
        ox=parseFloat(el.style.left)/100*r.width; oy=parseFloat(el.style.top)/100*r.height;
      };
      const move=(e)=>{
        if(!dragging) return; e.preventDefault();
        const p=point(e); const r=board.getBoundingClientRect();
        let nx=ox+(p.x-sx), ny=oy+(p.y-sy);
        nx=Math.max(0,Math.min(r.width,nx)); ny=Math.max(0,Math.min(r.height,ny));
        el.style.left=(nx/r.width*100)+'%'; el.style.top=(ny/r.height*100)+'%';
      };
      const end=()=>dragging=false;
      el.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
      el.addEventListener('touchstart',start,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end);
    }
    function point(e){ return e.touches? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

    function clearAll(){ board.querySelectorAll('.drop-item').forEach(n=>n.remove()); selected=null; hideCtrl(); toast('전체 지웠어요!'); }

    // ===== 저장 (SVG→Canvas 렌더링) =====
    function renderToCanvas(cb){
      const size=440;
      const cvs=document.createElement('canvas'); cvs.width=size; cvs.height=size;
      const ctx=cvs.getContext('2d');
      // 배경
      ctx.fillStyle = product==='card'? bgColor : '#e5e5e5';
      ctx.fillRect(0,0,size,size);
      // 제품 SVG를 이미지로
      const svgData='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="'+size+'" height="'+size+'">'+bag.innerHTML+'</svg>';
      const img=new Image();
      img.onload=()=>{
        ctx.drawImage(img,0,0,size,size);
        // 아이템들
        const r=board.getBoundingClientRect();
        board.querySelectorAll('.drop-item').forEach(el=>{
          const x=parseFloat(el.style.left)/100*size;
          const y=parseFloat(el.style.top)/100*size;
          const scale=+el.dataset.scale, rot=+el.dataset.rot*Math.PI/180;
          ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
          ctx.textAlign='center'; ctx.textBaseline='middle';
          if(el.dataset.text==='1'){ ctx.font=`800 ${scale}px sans-serif`; ctx.fillStyle=el.style.color||'#f2740c'; }
          else { ctx.font=`${scale}px serif`; ctx.fillStyle='#000'; }
          ctx.fillText(el.dataset.label, 0, 0);
          ctx.restore();
        });
        // 워터마크
        ctx.fillStyle='rgba(242,116,12,.85)'; ctx.font='bold 15px sans-serif'; ctx.textAlign='right';
        ctx.fillText('🍊 제주 감귤 굿즈', size-12, size-12);
        cb(cvs.toDataURL('image/png'));
      };
      // 아이템의 firstChild가 텍스트노드가 아니라 텍스트 컨텐츠 처리 보정
      img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgData);
    }

    function saveDesign(){
      renderToCanvas(url=>downloadDataURL(url,'감귤굿즈_'+product+'_'+Date.now()+'.png'));
    }
    function submitDesign(){
      const items=board.querySelectorAll('.drop-item').length;
      if(items===0){ toast('아이템을 하나 이상 추가해주세요! 🍊'); return; }
      renderToCanvas(url=>{
        // 응모작 저장
        try{
          const list=JSON.parse(localStorage.getItem('gamgyul_goods_entries')||'[]');
          list.push({ product, img:url, t:Date.now() });
          localStorage.setItem('gamgyul_goods_entries', JSON.stringify(list.slice(-30)));
        }catch(e){}
        toast('🎉 이벤트에 응모 완료! 우수작으로 선정되면 실물로 제작해드려요');
      });
    }

    // 텍스트 아이템은 firstChild가 텍스트라 위 로직 보정: 저장 시 텍스트 노드 기준
    // (스티커는 텍스트노드가 이모지, del버튼은 이후) — 안전하게 재정의
    drawProduct();
  </script>
</body>
</html>
