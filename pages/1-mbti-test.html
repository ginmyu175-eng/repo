<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나만의 감귤 품종 매칭 테스트 🍊</title>
<link rel="stylesheet" href="../assets/style.css" />
<style>
  .q-card { max-width: 640px; margin: 0 auto; }
  .q-num { font-weight: 800; color: var(--orange); font-size: 14px; }
  .q-text { font-size: 22px; font-weight: 800; margin: 8px 0 24px; line-height: 1.4; }
  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    text-align: left; padding: 16px 20px; border-radius: 16px;
    border: 2px solid #ffe0bf; background: #fffdfa; cursor: pointer;
    font-family: inherit; font-size: 16px; font-weight: 600; color: var(--ink);
    transition: .15s;
  }
  .opt:hover { border-color: var(--orange); background: #fff6ec; transform: translateX(4px); }
  .result-emoji { font-size: 80px; }
  .result-name { font-size: 34px; font-weight: 900; color: var(--orange-deep); margin: 6px 0; }
  .result-tag { display:inline-block; background: var(--cream-2); color: var(--orange-deep); font-weight:800; padding:6px 16px; border-radius:999px; font-size:14px; }
  .result-desc { font-size: 16px; color: var(--ink-soft); margin: 18px 0; }
  .traits { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin: 14px 0; }
  .traits span { background:#fff3e2; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:700; color:var(--orange-deep); }
  .match-box { background: var(--cream); border-radius:16px; padding:16px; margin-top:18px; font-size:14.5px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="logo" href="../index.html"><span class="dot"></span>감귤 체험존</a>
    <a class="back" href="../index.html">← 메인으로</a>
  </div>

  <header class="page-head">
    <div class="emoji">🧡</div>
    <h1>나만의 감귤 품종 매칭 테스트</h1>
    <p>내가 만약 감귤로 태어난다면? 12가지 질문으로 찾는 나의 감귤 품종</p>
  </header>

  <main class="wrap">
    <!-- 시작 화면 -->
    <section id="intro" class="card q-card center">
      <div style="font-size:60px">🍊🍋🍊</div>
      <h2 style="margin:10px 0 6px">당신과 꼭 닮은 감귤은?</h2>
      <p style="color:var(--ink-soft)">한라봉, 천혜향, 레드향, 청귤, 황금향, 하우스밀감…<br/>6가지 품종 중 당신의 성향과 가장 잘 어울리는 감귤을 찾아드려요!</p>
      <button class="btn mt" onclick="start()">테스트 시작하기 🍊</button>
    </section>

    <!-- 질문 화면 -->
    <section id="quiz" class="card q-card hidden">
      <div class="progress"><i id="bar"></i></div>
      <div class="q-num" id="qnum"></div>
      <div class="q-text" id="qtext"></div>
      <div class="opts" id="opts"></div>
    </section>

    <!-- 결과 화면 -->
    <section id="result" class="card q-card center hidden">
      <div class="result-emoji" id="rEmoji"></div>
      <div class="result-name" id="rName"></div>
      <span class="result-tag" id="rTag"></span>
      <div class="traits" id="rTraits"></div>
      <div class="result-desc" id="rDesc"></div>
      <div class="match-box" id="rMatch"></div>
      <div id="shareArea"></div>
      <button class="btn ghost mt" onclick="location.reload()">🔄 다시 테스트하기</button>
    </section>
  </main>

  <footer class="site">🍊 제주 감귤 체험존 · 감귤 품종 매칭 테스트</footer>

  <script src="../assets/common.js"></script>
  <script>
    // 각 답변은 4가지 축 점수에 기여: E(활발)/I(차분), 달콤/상큼, 대중적/개성적, 프리미엄/친근
    const questions = [
      { q: "감귤밭에 도착한 당신, 가장 먼저 하는 일은?",
        a: [
          { t: "친구들 불러서 다같이 귤 따기 대회!", s:{e:2, warm:1} },
          { t: "혼자 조용히 귤 향기부터 음미하기", s:{i:2, calm:1} },
          { t: "제일 예쁜 귤부터 사진 찍기", s:{uniq:2} },
          { t: "가장 잘 익은 귤을 찾아 바로 맛보기", s:{sweet:2} },
        ]},
      { q: "당신이 좋아하는 감귤의 맛은?",
        a: [
          { t: "꿀처럼 진하게 달콤한 맛", s:{sweet:2, prem:1} },
          { t: "새콤 상큼 톡 쏘는 맛", s:{sour:2} },
          { t: "달콤함과 상큼함이 균형잡힌 맛", s:{warm:1, sweet:1} },
          { t: "향이 진하고 독특한 맛", s:{uniq:2, prem:1} },
        ]},
      { q: "친구들이 말하는 당신의 매력은?",
        a: [
          { t: "어디서나 사랑받는 인기쟁이", s:{e:2, warm:2} },
          { t: "알수록 빠져드는 반전 매력", s:{i:1, uniq:2} },
          { t: "고급스럽고 세련된 분위기", s:{prem:2} },
          { t: "편하고 친근한 국민 매력", s:{warm:2} },
        ]},
      { q: "주말에 가장 하고 싶은 것은?",
        a: [
          { t: "핫플레이스 탐방 & 파티", s:{e:2, uniq:1} },
          { t: "집에서 넷플릭스 정주행", s:{i:2, calm:1} },
          { t: "감성 카페에서 브런치", s:{prem:1, uniq:1} },
          { t: "가족·친구와 소소한 나들이", s:{warm:2} },
        ]},
      { q: "당신의 SNS 피드는?",
        a: [
          { t: "화려하고 개성 넘치는 컨셉샷", s:{uniq:2} },
          { t: "따뜻한 일상 기록", s:{warm:2, calm:1} },
          { t: "감각적인 무드 사진", s:{prem:2} },
          { t: "친구들과의 활기찬 순간들", s:{e:2} },
        ]},
      { q: "새로운 도전 앞에서 당신은?",
        a: [
          { t: "일단 부딪혀보는 행동파!", s:{e:2, sour:1} },
          { t: "신중하게 계획부터 세우기", s:{i:2, calm:2} },
          { t: "남들과 다른 나만의 방식으로", s:{uniq:2} },
          { t: "믿을 만한 정석대로 차근차근", s:{warm:1, sweet:1} },
        ]},
      { q: "선물을 고를 때 당신의 기준은?",
        a: [
          { t: "받는 사람이 놀랄 특별한 것", s:{uniq:2, prem:1} },
          { t: "누구나 좋아하는 무난한 것", s:{warm:2} },
          { t: "고급스럽고 값진 것", s:{prem:2} },
          { t: "달달하고 기분 좋아지는 것", s:{sweet:2} },
        ]},
      { q: "당신의 에너지가 가장 넘칠 때는?",
        a: [
          { t: "사람들과 함께 있을 때", s:{e:2, warm:1} },
          { t: "혼자만의 시간을 가질 때", s:{i:2, calm:1} },
          { t: "새로운 것을 발견했을 때", s:{uniq:2} },
          { t: "맛있는 걸 먹을 때!", s:{sweet:2} },
        ]},
    ];

    // 품종 정의
    const fruits = {
      hallabong: { emoji:"🍊", name:"한라봉", tag:"프리미엄 인기스타",
        traits:["#고급진","#존재감","#인싸"],
        desc:"울퉁불퉁 개성 있는 꼭지처럼, 당신은 어디서나 눈에 띄는 존재감을 가진 사람! 달콤함과 카리스마를 동시에 지닌 프리미엄 감귤이에요.",
        match:"🧡 <b>천혜향</b>과 환상의 궁합! 서로의 매력을 알아봐 주는 사이랍니다." },
      cheonhye: { emoji:"🍯", name:"천혜향", tag:"우아한 달콤파",
        traits:["#부드러움","#세련","#감성"],
        desc:"'하늘이 내린 향'이라는 이름처럼, 은은하고 우아한 매력의 소유자. 진한 달콤함과 부드러운 향으로 사람들을 사로잡아요.",
        match:"🍊 <b>한라봉</b>과 잘 어울려요. 프리미엄끼리 통하는 게 있죠!" },
      redhyang: { emoji:"❤️", name:"레드향", tag:"열정 가득 매력덩어리",
        traits:["#열정적","#진한매력","#리더"],
        desc:"붉은빛이 도는 진한 과육처럼, 뜨거운 열정과 강한 존재감을 가진 당신! 한 번 만나면 잊을 수 없는 강렬한 매력의 소유자예요.",
        match:"💛 <b>황금향</b>과 좋은 파트너! 서로 에너지를 북돋아 주는 사이." },
      cheonggyul: { emoji:"💚", name:"청귤", tag:"쿨하고 개성만점",
        traits:["#상큼","#개성","#쿨함"],
        desc:"덜 익은 듯 새콤하지만 그래서 더 매력적인 청귤! 남들과 다른 나만의 색깔이 뚜렷하고, 톡톡 튀는 개성으로 주목받는 사람이에요.",
        match:"🍊 <b>하우스밀감</b>의 편안함이 당신의 톡톡함을 완성시켜 줘요." },
      hwanggeum: { emoji:"💛", name:"황금향", tag:"밝고 사교적인 인싸",
        traits:["#햇살같은","#긍정","#분위기메이커"],
        desc:"황금빛처럼 밝게 빛나는 에너지! 어디서나 분위기를 살리는 활기찬 분위기 메이커. 함께 있으면 기분이 좋아지는 비타민 같은 사람이에요.",
        match:"❤️ <b>레드향</b>과 최고의 콤비! 열정 + 활기 = 무적조합." },
      house: { emoji:"🍊", name:"하우스 밀감", tag:"언제나 든든한 국민감귤",
        traits:["#친근함","#편안함","#다정"],
        desc:"사철 내내 만날 수 있는 하우스 밀감처럼, 언제나 곁에 있어 주는 든든하고 따뜻한 사람! 꾸밈없는 다정함이 최고의 매력이에요.",
        match:"💚 <b>청귤</b>과 의외로 찰떡! 편안함과 개성이 만나면 완벽해요." },
    };

    let idx = 0;
    const score = { e:0,i:0, sweet:0,sour:0, warm:0,calm:0, uniq:0, prem:0 };

    function start(){
      document.getElementById('intro').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      render();
    }

    function render(){
      const q = questions[idx];
      document.getElementById('bar').style.width = (idx/questions.length*100)+'%';
      document.getElementById('qnum').textContent = `Q${idx+1} / ${questions.length}`;
      document.getElementById('qtext').textContent = q.q;
      const wrap = document.getElementById('opts');
      wrap.innerHTML = '';
      q.a.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.textContent = opt.t;
        b.onclick = () => pick(opt.s);
        wrap.appendChild(b);
      });
    }

    function pick(s){
      for (const k in s) score[k] = (score[k]||0) + s[k];
      idx++;
      if (idx < questions.length) render();
      else showResult();
    }

    function decide(){
      // 규칙 기반 매칭
      const prem = score.prem, uniq = score.uniq, warm = score.warm;
      const sweet = score.sweet, sour = score.sour, e = score.e, i = score.i;
      // 우선순위 점수 계산
      const cand = {
        hallabong: prem*1.5 + (e>i?e:0) + sweet*0.5,
        cheonhye:  prem*1.3 + sweet*1.2 + (i>e?i:0),
        redhyang:  score.e*1.0 + sweet*1.0 + prem*0.8 + (uniq*0.5),
        cheonggyul: sour*1.6 + uniq*1.4 + (i>e?i:0),
        hwanggeum: e*1.6 + warm*0.8 + sweet*0.6,
        house:     warm*1.8 + (i>e?i*0.5:0) + sweet*0.4,
      };
      let best = 'house', bestV = -1;
      for (const k in cand) if (cand[k] > bestV) { bestV = cand[k]; best = k; }
      return best;
    }

    function showResult(){
      document.getElementById('bar').style.width = '100%';
      const key = decide();
      const f = fruits[key];
      document.getElementById('quiz').classList.add('hidden');
      const r = document.getElementById('result');
      r.classList.remove('hidden');
      document.getElementById('rEmoji').textContent = f.emoji;
      document.getElementById('rName').textContent = f.name;
      document.getElementById('rTag').textContent = f.tag;
      document.getElementById('rTraits').innerHTML = f.traits.map(t=>`<span>${t}</span>`).join('');
      document.getElementById('rDesc').textContent = f.desc;
      document.getElementById('rMatch').innerHTML = "💞 <b>나와 잘 맞는 감귤은?</b><br/>" + f.match;
      document.getElementById('shareArea').innerHTML =
        "<p style='margin:18px 0 4px;font-weight:800;color:var(--orange-deep)'>결과를 친구에게 자랑해보세요!</p>" +
        shareButtons("감귤 품종 테스트", `나는 '${f.name}' 감귤! ${f.tag} 🍊 당신의 감귤 품종도 찾아보세요!`);
    }
  </script>
</body>
</html>
